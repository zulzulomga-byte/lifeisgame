<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cek Data Life Is Game</title>
<style>
  body{font-family:sans-serif;background:#111;color:#eee;padding:20px;line-height:1.5}
  h1{font-size:18px;color:#baff29}
  .box{background:#1c1c1c;border:1px solid #333;border-radius:10px;padding:14px;margin-top:14px;word-break:break-all;font-size:12px;white-space:pre-wrap}
  .status{font-weight:bold;font-size:15px;margin-top:10px}
  .ok{color:#3ecf73}
  .bad{color:#f06464}
  button{background:#baff29;color:#111;border:none;padding:10px 16px;border-radius:8px;font-weight:bold;margin-top:14px;cursor:pointer}
</style>
</head>
<body>
<h1>Cek isi localStorage "lig_data"</h1>
<div id="result">Mengecek...</div>
<button onclick="location.reload()">Cek Ulang</button>

<script>
try {
  const raw = localStorage.getItem('lig_data');
  const el = document.getElementById('result');
  if (raw === null) {
    el.innerHTML = '<div class="status bad">KOSONG (null) — gak ada data sama sekali di storage domain ini.</div>';
  } else if (raw === '{}' || raw.trim() === '') {
    el.innerHTML = '<div class="status bad">ADA tapi ISINYA KOSONG ({}) — data pernah ke-reset jadi object kosong.</div><div class="box">'+raw+'</div>';
  } else {
    let parsed;
    let parseOk = true;
    try { parsed = JSON.parse(raw); } catch(e) { parseOk = false; }
    if (!parseOk) {
      el.innerHTML = '<div class="status bad">ADA datanya tapi GAGAL DI-PARSE (rusak/corrupt JSON).</div><div class="box">'+raw.slice(0,2000)+'</div>';
    } else {
      const taskCount = (parsed.tasks||[]).length;
      const checksCount = Object.keys(parsed.checks||{}).length;
      const xp = parsed.xp !== undefined ? parsed.xp : '(gak ada field xp)';
      const profileName = parsed.profile ? parsed.profile.name : '(gak ada profile)';
      el.innerHTML = '<div class="status ok">DATA DITEMUKAN!</div>'+
        '<div class="box">Nama profil: '+profileName+'\nJumlah task: '+taskCount+'\nJumlah checks tersimpan: '+checksCount+'\nXP field: '+xp+'\n\n--- RAW JSON (1000 karakter awal) ---\n'+raw.slice(0,1000)+'</div>';
    }
  }
} catch(e) {
  document.getElementById('result').innerHTML = '<div class="status bad">ERROR saat baca localStorage: '+e.message+'</div>';
}

// Tampilkan juga SEMUA key yang ada di localStorage domain ini, siapa tau datanya kesimpan di key lain
try {
  const allKeys = Object.keys(localStorage);
  const keysBox = document.createElement('div');
  keysBox.innerHTML = '<div class="status">Semua key localStorage di domain ini:</div><div class="box">'+(allKeys.length ? allKeys.join('\n') : '(tidak ada key sama sekali)')+'</div>';
  document.body.appendChild(keysBox);
} catch(e) {}
</script>
</body>
</html>
